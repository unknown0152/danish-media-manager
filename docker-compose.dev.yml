services:
  danish-media-manager:
    build: .
    container_name: danish-media-manager
    restart: unless-stopped
    environment:
      PROWLARR_URL: http://prowlarr:9696
      PROWLARR_API_KEY: ${PROWLARR_API_KEY:?set PROWLARR_API_KEY}
      ALTMOUNT_URL: http://danish-intelligence:9699/altmount
      ALTMOUNT_API_KEY: ${ALTMOUNT_API_KEY:?set ALTMOUNT_API_KEY}
      RADARR_URL: http://radarr:7878
      RADARR_API_KEY: ${RADARR_API_KEY:-}
      SONARR_URL: http://sonarr:8989
      SONARR_API_KEY: ${SONARR_API_KEY:-}
      SEERR_URL: http://seerr:5055
      SEERR_API_KEY: ${SEERR_API_KEY:-}
      DATABASE_PATH: /data/danish-media-manager.db
      SEERR_AUTO_GRAB: "true"
      SEERR_ACTIVE_SEARCH_ON_IMPORT: "true"
      RECENT_FEED_SYNC_ENABLED: "true"
      RECENT_FEED_SYNC_INTERVAL_SECONDS: "900"
      RECENT_FEED_LIMIT: "500"
      WANTED_SEARCH_ENABLED: "false"
      WANTED_SEARCH_MAX_PER_CYCLE: "2"
    volumes:
      - ./data:/data
      - /mnt:/mnt:ro,rshared
      - /srv/media:/media:ro
    networks:
      - media-stack
    ports:
      - "8088:8080"

networks:
  media-stack:
    external: true
